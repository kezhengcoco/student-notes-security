<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Note</title>
</head>
<body>

    <h1>Create a New Note</h1>

    <form method="POST">

        <label>Title:</label>
        <br>

        <input
            type="text"
            name="title"
            required
        >

        <br><br>

        <label>Content:</label>
        <br>

        <textarea
            name="content"
            rows="10"
            cols="50"
            required
        ></textarea>

        <br><br>

        <button type="submit">
            Create Note
        </button>

    </form>

    <br>

    <a href="/notes">
        Back to notes
    </a>

</body>
</html>
