<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Notes</title>
</head>
<body>

    <h1>Student Notes</h1>

    <p>
        Welcome, {{ session["username"] }}!
    </p>

    <p>
        <a href="/create-note">Create a new note</a>
        |
        <a href="/logout">Logout</a>
    </p>

    <hr>

    {% for note in notes %}

        <article>

        <!--
            FLAW 2: STORED CROSS-SITE SCRIPTING (XSS)
            OWASP A03:2021 - Injection
        
            VULNERABLE VERSION:
            The safe filter disables automatic HTML escaping.
            User-controlled content is rendered as HTML.
        -->
        
        <h2>{{ note["title"] | safe }}</h2>
        
        <p>
            {{ note["content"] | safe }}
        </p>
        
        
        <!--
            FIXED VERSION:
        
            <h2>{{ note["title"] }}</h2>
        
            <p>
                {{ note["content"] }}
            </p>
        
            Jinja2 automatically escapes HTML characters by default.
        -->

            <p>
                Author ID: {{ note["author_id"] }}
            </p>

            <a href="/delete-note/{{ note['id'] }}">
                Delete this note
            </a>

        </article>

        <hr>

    {% endfor %}

</body>
</html>
